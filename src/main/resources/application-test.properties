# Настройки подключения к H2 в памяти
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Настройки Liquibase для тестов
spring.liquibase.enabled=true
# В памяти база всегда пустая, поэтому drop-first обычно не нужен
spring.liquibase.drop-first=false

# Настройки JPA / Hibernate
# Используем диалект H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Hibernate должен только проверять схему, которую создал Liquibase
spring.jpa.hibernate.ddl-auto=validate
# Чтобы видеть SQL запросы в консоли тестов
spring.jpa.show-sql=true